<svg width="500" height="450" viewBox="0 0 350 490" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="90%">
      <stop offset="0%" stop-color="#f0f0ec"/>
      <stop offset="100%" stop-color="#c8c8c2"/>
    </radialGradient>
    <linearGradient id="border" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#757575"/>
      <stop offset="100%" stop-color="#232228"/>
    </linearGradient>
  </defs>
  <!-- Fond et cadre -->
  <rect x="0" y="0" width="350" height="490" rx="30" ry="30" fill="url(#bg)" stroke="url(#border)" stroke-width="10"/>
  <!-- Bandeau titre -->
  <rect x="30" y="35" width="290" height="55" rx="10" ry="10" fill="#1d1d22" opacity="0.95"/>
  <text x="175" y="70" font-family="Arial, sans-serif" font-size="26" fill="#fff" font-weight="bold" text-anchor="middle" letter-spacing="1.5">
    RÉSERVES CACHÉES
  </text>
  <!-- Zone principale -->
  <rect x="30" y="110" width="290" height="320" rx="18" ry="18" fill="#ffffff" opacity="0.72"/>
  <!-- Bloc résumé court -->
  <text x="46" y="138" font-family="Arial, sans-serif" font-size="15" fill="#111" font-weight="bold">
    Fin de la phase de Commandement (ou fin de votre tour 5 si vous jouez en second)
  </text>
  <text x="46" y="164" font-family="Arial, sans-serif" font-size="13.5" fill="#1a1a19">
    Lors de la mise en place, ajoutez un objectif en No Man's Land. Avant cela, déplacez l'objectif central de 15 cm vers un coin. Placez ensuite le nouvel objectif 15 cm vers le coin opposé.
  </text>
  <text x="46" y="205" font-family="Arial, sans-serif" font-size="14" fill="#222" font-weight="bold">
    Score :
  </text>
  <text x="54" y="228" font-family="Arial, sans-serif" font-size="13.5" fill="#222">
    • 1 objectif hors zone : 5 PV
  </text>
  <text x="54" y="246" font-family="Arial, sans-serif" font-size="13.5" fill="#222">
    • 2 objectifs hors zone : 5 PV
  </text>
  <text x="54" y="264" font-family="Arial, sans-serif" font-size="13.5" fill="#222">
    • Plus d’objectifs que l’adversaire : 5 PV
  </text>
</svg>
